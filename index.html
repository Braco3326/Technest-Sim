<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audio Sim</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: #1a1a2e; font-family: system-ui, sans-serif; }
      #renderCanvas { width: 100vw; height: 100vh; touch-action: none; }
      #hud { position: fixed; inset: 0; pointer-events: none; color: #e8ecff; }
      #hud button { pointer-events: auto; }
      .hud-panel {
        position: absolute; top: 16px; left: 16px; max-width: 380px;
        background: rgba(10, 14, 28, 0.82); border: 1px solid #2c3654;
        border-radius: 10px; padding: 14px 16px; backdrop-filter: blur(4px);
      }
      .hud-panel h1 { font-size: 15px; margin-bottom: 6px; }
      #hud a { pointer-events: auto; }
      #hud-levels { display: flex; gap: 6px; margin-bottom: 10px; }
      #hud-levels a {
        font-size: 11px; font-weight: 600; text-decoration: none; color: #9aa5c9;
        border: 1px solid #2c3654; border-radius: 6px; padding: 3px 9px;
      }
      #hud-levels a.current { color: #06210f; background: #3ddc7f; border-color: #3ddc7f; }
      #hud-controls {
        top: auto; left: auto; right: 16px; bottom: 16px; max-width: 340px;
        max-height: 60vh; overflow-y: auto; pointer-events: auto;
      }
      #hud-controls h2 { font-size: 13px; margin-bottom: 8px; color: #9aa5c9; }
      .cp-device h3 { font-size: 12px; margin: 8px 0 6px; }
      .cp-toggle {
        display: flex; align-items: center; gap: 8px; width: 100%; text-align: left;
        background: none; border: 1px solid #2c3654; border-radius: 7px; color: #e8ecff;
        font-size: 12px; padding: 6px 9px; margin-bottom: 5px; cursor: pointer;
      }
      .cp-toggle i {
        flex: none; width: 26px; height: 14px; border-radius: 7px; background: #2c3654;
        position: relative; transition: background 0.15s;
      }
      .cp-toggle i::after {
        content: ''; position: absolute; top: 2px; left: 2px; width: 10px; height: 10px;
        border-radius: 50%; background: #9aa5c9; transition: left 0.15s, background 0.15s;
      }
      .cp-toggle[aria-pressed='true'] i { background: #1d5c38; }
      .cp-toggle[aria-pressed='true'] i::after { left: 14px; background: #3ddc7f; }
      .cp-matrix { border-collapse: collapse; font-size: 10.5px; margin-top: 4px; }
      .cp-matrix th, .cp-matrix td { border: 1px solid #2c3654; padding: 3px 6px; color: #9aa5c9; }
      .cp-cell {
        width: 18px; height: 18px; border: 1px solid #4a5678; border-radius: 4px;
        background: none; cursor: pointer;
      }
      .cp-cell[aria-pressed='true'] { background: #3ddc7f; border-color: #3ddc7f; }
      .hud-brief { font-size: 12px; color: #9aa5c9; margin-bottom: 10px; }
      #hud-checklist { list-style: none; font-size: 12.5px; }
      #hud-checklist li { padding: 3px 0 3px 22px; position: relative; }
      #hud-checklist li::before {
        content: ''; position: absolute; left: 2px; top: 6px; width: 12px; height: 12px;
        border: 1.5px solid #4a5678; border-radius: 3px;
      }
      #hud-checklist li.done { color: #3ddc7f; }
      #hud-checklist li.done::before {
        content: '✓'; border-color: #3ddc7f; color: #3ddc7f;
        font-size: 11px; line-height: 12px; text-align: center;
      }
      #hud-counter { margin-top: 8px; font-size: 12px; color: #9aa5c9; }
      #hud-toasts {
        position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
        display: flex; flex-direction: column; gap: 8px; align-items: center;
      }
      .toast {
        max-width: 520px; padding: 10px 16px; border-radius: 8px; font-size: 13px;
        background: rgba(15, 19, 36, 0.94); border-left: 4px solid #888;
        animation: toast-in 0.25s ease-out;
      }
      .toast strong { display: block; margin-bottom: 2px; font-size: 12px; }
      .toast-error { border-left-color: #ff4d5e; }
      .toast-error strong { color: #ff8d97; }
      .toast-warning { border-left-color: #ffb54e; }
      .toast-warning strong { color: #ffcf8d; }
      .toast-info { border-left-color: #4da6ff; }
      .toast-info strong { color: #8dc6ff; }
      @keyframes toast-in { from { opacity: 0; transform: translateY(8px); } }
      #hud-win {
        position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
        background: rgba(4, 6, 14, 0.75); pointer-events: auto;
      }
      /* author display:flex beats the UA's [hidden]{display:none} — restore it */
      #hud-win[hidden] { display: none; }
      .win-card {
        background: #0f1324; border: 1px solid #2c3654; border-radius: 14px;
        padding: 28px 34px; max-width: 460px; text-align: center;
      }
      .win-card h2 { color: #3ddc7f; margin-bottom: 12px; }
      .win-card h3 { font-size: 13px; color: #9aa5c9; margin: 16px 0 6px; }
      .win-card ul { list-style: none; font-size: 13px; }
      .win-card button {
        margin-top: 18px; padding: 9px 26px; border: 0; border-radius: 8px;
        background: #3ddc7f; color: #06210f; font-weight: 600; cursor: pointer;
      }
    </style>
  </head>
  <body>
    <canvas id="renderCanvas"></canvas>
    <div id="hud"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
